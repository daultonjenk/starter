name: 🤖 Agent Task
description: Dispatch an AI agent to work on this repository
labels: ["agent-task"]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Agent
      description: Which model should handle this task?
      options:
        - Auto (cheapest)
        - Kimi K2
        - DeepSeek R1
        - DeepSeek Chat
        - Gemini Flash
        - Gemini Pro
        - Sonnet
        - Opus
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Review only (no commits)
        - Fix and open PR
        - Fix and push directly (no PR)
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Task description
      placeholder: Describe what you want the agent to do...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context (optional)
      placeholder: |
        Paste relevant file paths, error messages, related issue
        numbers, specific branches to target, etc.
